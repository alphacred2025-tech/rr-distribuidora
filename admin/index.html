<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — RR Distribuidora</title>
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <img src="../assets/img/logo.svg" alt="RR Distribuidora">
    </div>
    <h1 class="login-titulo">Painel Interno</h1>
    <p class="login-subtitulo">Acesso exclusivo para colaboradores RR Distribuidora</p>
    <div class="login-erro" id="login-erro">E-mail ou senha incorretos.</div>
    <form id="form-login">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="inp-email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="inp-senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary btn--full btn--lg" id="btn-login">Entrar</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const db = supabase.createClient(
  'https://tyqcapyezlamjffbjagl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR5cWNhcHllemxhbWpmZmJqYWdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDU5MTQsImV4cCI6MjA5NTQ4MTkxNH0.JGqb9LFloiQ3fx8RvlH2d3bms1rDld7iEcICuZGfyXs'
);

const ROTAS = { admin:'painel.html', vendedor:'comercial.html', logistica:'logistica.html', financeiro:'financeiro.html', montador:'logistica.html', motoboy:'logistica.html' };

// Se já logado, redireciona
db.auth.getSession().then(async ({ data: { session } }) => {
  if (!session) return;
  const { data: p } = await db.from('profiles').select('papel').eq('id', session.user.id).single();
  if (p) location.href = ROTAS[p.papel] || 'painel.html';
});

document.getElementById('form-login').addEventListener('submit', async e => {
  e.preventDefault();
  const btn   = document.getElementById('btn-login');
  const erro  = document.getElementById('login-erro');
  erro.classList.remove('login-erro--show');
  btn.textContent = 'Entrando…';
  btn.disabled = true;

  const { data, error } = await db.auth.signInWithPassword({
    email:    document.getElementById('inp-email').value.trim(),
    password: document.getElementById('inp-senha').value,
  });

  if (error) {
    erro.classList.add('login-erro--show');
    btn.textContent = 'Entrar';
    btn.disabled = false;
    return;
  }

  const { data: p } = await db.from('profiles').select('papel').eq('id', data.user.id).single();
  location.href = ROTAS[p?.papel] || 'painel.html';
});
</script>
</body>
</html>
